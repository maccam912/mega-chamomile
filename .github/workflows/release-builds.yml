name: Build and release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  GODOT_VERSION: 4.7-stable
  GODOT_TEMPLATE_VERSION: 4.7.stable

jobs:
  build:
    name: Build desktop packages
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Godot and export templates
        shell: bash
        run: |
          set -euo pipefail

          base_url="https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}"
          curl --fail --location --retry 3 \
            --output /tmp/godot.zip \
            "${base_url}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          curl --fail --location --retry 3 \
            --output /tmp/export_templates.tpz \
            "${base_url}/Godot_v${GODOT_VERSION}_export_templates.tpz"

          mkdir -p "$HOME/.local/bin" /tmp/godot-templates
          unzip -q /tmp/godot.zip -d "$HOME/.local/bin"
          godot_binary="$HOME/.local/bin/Godot_v${GODOT_VERSION}_linux.x86_64"
          chmod +x "$godot_binary"
          ln -s "$godot_binary" "$HOME/.local/bin/godot"

          unzip -q /tmp/export_templates.tpz -d /tmp/godot-templates
          template_dir="$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}"
          mkdir -p "$template_dir"
          mv /tmp/godot-templates/templates/* "$template_dir/"

          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Import project resources
        run: godot --headless --path . --import

      - name: Export Linux x86_64
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/linux packages
          godot --headless --path . --export-release Linux build/linux/mega-chamomile.x86_64
          (cd build/linux && zip -9 -r ../../packages/mega-chamomile-linux-x86_64.zip .)

      - name: Export Windows x86_64
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/windows
          godot --headless --path . --export-release 'Windows Desktop' build/windows/mega-chamomile.exe
          (cd build/windows && zip -9 -r ../../packages/mega-chamomile-windows-x86_64.zip .)

      - name: Export macOS Universal
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/macos
          godot --headless --path . --export-release macOS build/macos/mega-chamomile-macos-universal.zip
          cp build/macos/mega-chamomile-macos-universal.zip packages/

      - name: Upload packaged builds to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: desktop-builds-${{ github.run_number }}-${{ github.run_attempt }}
          path: packages/*.zip
          if-no-files-found: error

  verify-macos:
    name: Verify macOS package
    needs: build
    runs-on: macos-latest

    steps:
      - name: Download packaged builds
        uses: actions/download-artifact@v4
        with:
          name: desktop-builds-${{ github.run_number }}-${{ github.run_attempt }}
          path: packages

      - name: Verify signature, architectures, and launch
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p verify
          ditto -x -k packages/mega-chamomile-macos-universal.zip verify

          app="verify/Mega Chamomile.app"
          executable="$app/Contents/MacOS/Mega Chamomile"
          codesign --verify --deep --strict --verbose=2 "$app"

          architectures="$(lipo -archs "$executable")"
          [[ "$architectures" == *x86_64* ]]
          [[ "$architectures" == *arm64* ]]

          "$executable" --headless --quit-after 1

  release:
    name: Create GitHub Release
    needs:
      - build
      - verify-macos
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged builds
        uses: actions/download-artifact@v4
        with:
          name: desktop-builds-${{ github.run_number }}-${{ github.run_attempt }}
          path: packages

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="build-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
          short_sha="${GITHUB_SHA::7}"
          notes="Automated desktop builds from commit ${GITHUB_SHA}.

          macOS installation:
          1. Extract the ZIP and move Mega Chamomile.app to Applications.
          2. Control-click Mega Chamomile.app and choose Open.
          3. Click Open in the confirmation dialog.
          4. If Open is not offered, use System Settings > Privacy & Security > Open Anyway.

          The macOS build is universal and ad-hoc signed, but is not notarized because this project does not use a paid Apple Developer account. The Windows build is unsigned."

          gh release create "$tag" packages/*.zip \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Mega Chamomile build ${GITHUB_RUN_NUMBER} (${short_sha})" \
            --notes "$notes"
