name: Build and release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  GODOT_VERSION: 4.7-stable
  GODOT_TEMPLATE_VERSION: 4.7.stable

jobs:
  build:
    name: Build desktop packages
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install Godot and export templates
        shell: bash
        run: |
          set -euo pipefail

          base_url="https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}"
          curl --fail --location --retry 3 \
            --output /tmp/godot.zip \
            "${base_url}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          curl --fail --location --retry 3 \
            --output /tmp/export_templates.tpz \
            "${base_url}/Godot_v${GODOT_VERSION}_export_templates.tpz"

          mkdir -p "$HOME/.local/bin" /tmp/godot-templates
          unzip -q /tmp/godot.zip -d "$HOME/.local/bin"
          godot_binary="$HOME/.local/bin/Godot_v${GODOT_VERSION}_linux.x86_64"
          chmod +x "$godot_binary"
          ln -s "$godot_binary" "$HOME/.local/bin/godot"

          unzip -q /tmp/export_templates.tpz -d /tmp/godot-templates
          template_dir="$HOME/.local/share/godot/export_templates/${GODOT_TEMPLATE_VERSION}"
          mkdir -p "$template_dir"
          mv /tmp/godot-templates/templates/* "$template_dir/"

          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Import project resources
        run: godot --headless --path . --import

      - name: Export Linux x86_64
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/linux packages
          godot --headless --path . --export-release Linux build/linux/mega-chamomile.x86_64
          (cd build/linux && zip -9 -r ../../packages/mega-chamomile-linux-x86_64.zip .)

      - name: Export Windows x86_64
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/windows
          godot --headless --path . --export-release 'Windows Desktop' build/windows/mega-chamomile.exe
          (cd build/windows && zip -9 -r ../../packages/mega-chamomile-windows-x86_64.zip .)

      - name: Export macOS Universal
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/macos
          godot --headless --path . --export-release macOS build/macos/mega-chamomile-macos-universal.zip
          cp build/macos/mega-chamomile-macos-universal.zip packages/

      - name: Upload packaged builds to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: desktop-builds-${{ github.run_number }}-${{ github.run_attempt }}
          path: packages/*.zip
          if-no-files-found: error

  launcher-build:
    name: Build ${{ matrix.label }} launcher
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            label: Linux x86_64
            runner: ubuntu-latest
          - platform: windows
            label: Windows x86_64
            runner: windows-latest
          - platform: macos
            label: macOS Universal
            runner: macos-latest
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
          cache-dependency-path: launcher/go.mod

      - name: Test launcher
        working-directory: launcher
        run: go test ./...

      - name: Build Linux launcher
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p launcher-dist packages
          (
            cd launcher
            CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
              -trimpath \
              -ldflags "-s -w -X main.repository=${GITHUB_REPOSITORY} -X main.launcherVersion=${GITHUB_SHA}" \
              -o ../launcher-dist/mega-chamomile-launcher .
          )
          tar -C launcher-dist -czf packages/mega-chamomile-launcher-linux-x86_64.tar.gz mega-chamomile-launcher

      - name: Build Windows launcher
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path packages | Out-Null
          Set-Location launcher
          $env:CGO_ENABLED = '0'
          $ldflags = "-s -w -H=windowsgui -X main.repository=$env:GITHUB_REPOSITORY -X main.launcherVersion=$env:GITHUB_SHA"
          go build -trimpath -ldflags $ldflags -o ../packages/mega-chamomile-launcher-windows-x86_64.exe .

      - name: Build universal macOS launcher app
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          app="launcher-dist/Mega Chamomile Launcher.app"
          mkdir -p "$app/Contents/MacOS" packages
          for arch in amd64 arm64; do
            (
              cd launcher
              CGO_ENABLED=0 GOOS=darwin GOARCH="$arch" go build \
                -trimpath \
                -ldflags "-s -w -X main.repository=${GITHUB_REPOSITORY} -X main.launcherVersion=${GITHUB_SHA}" \
                -o "../launcher-dist/launcher-${arch}" .
            )
          done
          lipo -create \
            launcher-dist/launcher-amd64 \
            launcher-dist/launcher-arm64 \
            -output "$app/Contents/MacOS/Mega Chamomile Launcher"
          cp launcher/packaging/macos/Info.plist "$app/Contents/Info.plist"
          codesign --force --deep --sign - "$app"
          codesign --verify --deep --strict --verbose=2 "$app"
          ditto -c -k --sequesterRsrc --keepParent \
            "$app" \
            packages/mega-chamomile-launcher-macos-universal.zip

      - name: Upload launcher package
        uses: actions/upload-artifact@v4
        with:
          name: launcher-${{ matrix.platform }}-${{ github.run_number }}-${{ github.run_attempt }}
          path: packages/mega-chamomile-launcher-*
          if-no-files-found: error

  verify-macos:
    name: Verify macOS package
    needs: build
    runs-on: macos-latest

    steps:
      - name: Download packaged builds
        uses: actions/download-artifact@v4
        with:
          name: desktop-builds-${{ github.run_number }}-${{ github.run_attempt }}
          path: packages

      - name: Verify signature, architectures, and launch
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p verify
          ditto -x -k packages/mega-chamomile-macos-universal.zip verify

          app="verify/Mega Chamomile.app"
          executable="$app/Contents/MacOS/Mega Chamomile"
          codesign --verify --deep --strict --verbose=2 "$app"

          architectures="$(lipo -archs "$executable")"
          [[ "$architectures" == *x86_64* ]]
          [[ "$architectures" == *arm64* ]]

          "$executable" --headless --quit-after 1

  release:
    name: Create GitHub Release
    needs:
      - build
      - launcher-build
      - verify-macos
    runs-on: ubuntu-latest

    steps:
      - name: Download game and launcher packages
        uses: actions/download-artifact@v4
        with:
          path: packages
          merge-multiple: true

      - name: Create SHA-256 checksums
        shell: bash
        run: |
          set -euo pipefail
          (cd packages && sha256sum mega-* > SHA256SUMS.txt)

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="build-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
          short_sha="${GITHUB_SHA::7}"
          notes="Automated desktop builds and launchers from commit ${GITHUB_SHA}.

          Launcher installation (recommended):
          - Windows: download mega-chamomile-launcher-windows-x86_64.exe and double-click it.
          - macOS: download and extract mega-chamomile-launcher-macos-universal.zip, then open Mega Chamomile Launcher.app.
          - Linux: download and extract mega-chamomile-launcher-linux-x86_64.tar.gz, then run mega-chamomile-launcher.

          The launcher checks this repository's latest GitHub Release, downloads and verifies the correct game package only when needed, and then starts the game. It can use the last installed version while offline.

          macOS installation:
          1. Extract the launcher ZIP and optionally move Mega Chamomile Launcher.app to Applications.
          2. Control-click Mega Chamomile Launcher.app and choose Open the first time.
          3. Click Open in the confirmation dialog.
          4. If Open is not offered, use System Settings > Privacy & Security > Open Anyway.

          The macOS game and launcher are universal and ad-hoc signed, but are not notarized because this project does not use a paid Apple Developer account. The Windows game and launcher are unsigned."

          gh release create "$tag" packages/* \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Mega Chamomile build ${GITHUB_RUN_NUMBER} (${short_sha})" \
            --notes "$notes"
